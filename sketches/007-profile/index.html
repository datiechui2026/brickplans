<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人主页 · BrickPlans</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f7; --card-bg: #ffffff;
    --text: #1d1d1f; --text-sec: #86868b;
    --accent: #ff6b35; --accent-hv: #e55a2b;
    --radius: 16px; --shadow: 0 1px 4px rgba(0,0,0,.04);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); }

  .navbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,.72); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0,0,0,.06);
    padding: 0 24px; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-brand { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 700; text-decoration: none; color: var(--text); }
  .nav-actions { display: flex; align-items: center; gap: 12px; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600; padding: 7px 14px;
    border-radius: 10px; border: none; cursor: pointer; transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hv); }
  .btn-ghost { background: transparent; color: var(--text-sec); }
  .btn-ghost:hover { background: rgba(0,0,0,.04); color: var(--text); }
  .btn-outline { background: #fff; color: var(--accent); border: 1.5px solid var(--accent); }

  .main { max-width: 1160px; margin: 0 auto; padding: 24px 24px 80px; }

  /* Profile header */
  .profile-header {
    background: var(--card-bg); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 32px;
    display: flex; align-items: center; gap: 24px; margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .profile-avatar {
    width: 88px; height: 88px; border-radius: 50%;
    object-fit: cover; border: 4px solid #f0f0f0;
    background: #e8eaed; flex-shrink: 0;
  }
  .profile-info { flex: 1; min-width: 200px; }
  .profile-name { font-size: 24px; font-weight: 800; margin-bottom: 2px; }
  .profile-bio { font-size: 14px; color: var(--text-sec); line-height: 1.5; margin-top: 4px; max-width: 400px; }
  .profile-meta { font-size: 13px; color: var(--text-sec); display: flex; gap: 16px; }
  .profile-actions { display: flex; gap: 8px; }

  /* Stats row */
  .stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    margin-bottom: 24px;
  }
  .stat-box {
    background: var(--card-bg); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 18px; text-align: center;
  }
  .stat-box .number { font-size: 24px; font-weight: 800; color: var(--accent); }
  .stat-box .label { font-size: 12px; color: var(--text-sec); font-weight: 600; margin-top: 2px; }

  /* Tabs */
  .tabs {
    display: flex; gap: 0; margin-bottom: 20px;
    border-bottom: 2px solid #eee;
  }
  .tab-btn {
    font-size: 14px; font-weight: 700; padding: 10px 24px;
    border: none; background: transparent; color: var(--text-sec);
    cursor: pointer; border-bottom: 2px solid transparent;
    margin-bottom: -2px; transition: all .15s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover { color: var(--text); }

  /* Card grid */
  .card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

  .card {
    background: var(--card-bg); border-radius: var(--radius);
    overflow: hidden; cursor: pointer;
    transition: transform .2s, box-shadow .2s;
    box-shadow: var(--shadow);
  }
  .card:hover { transform: translateY(-6px); box-shadow: 0 8px 32px rgba(0,0,0,.08); }
  .card-img-wrap {
    position: relative; width: 100%; aspect-ratio: 4/3;
    overflow: hidden; background: #e8eaed;
  }
  .card-img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s; }
  .card:hover .card-img { transform: scale(1.06); }
  .card-diff {
    position: absolute; top: 10px; left: 10px;
    font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.2);
  }
  .card-parts {
    position: absolute; top: 10px; right: 10px;
    font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
    background: rgba(255,255,255,.88); color: #555;
  }
  .card-body { padding: 12px 14px; position: relative; }
  .card-title { font-size: 14px; font-weight: 700; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-stats { display: flex; gap: 14px; font-size: 12px; color: #999; margin-top: 6px; }
  .card-actions { position: absolute; right: 10px; bottom: 10px; display: flex; gap: 4px; }
  .card-actions .btn { font-size: 11px; padding: 4px 10px; border-radius: 8px; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-sec); }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

  /* Settings modal overlay (simplified) */
  .settings-panel {
    background: var(--card-bg); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 24px; margin-bottom: 24px;
  }
  .settings-panel h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 4px; }
  .form-input { width: 100%; padding: 8px 12px; border: 1.5px solid #e5e5e5; border-radius: 8px; font-size: 14px; background: #f5f5f7; outline: none; }
  .form-input:focus { border-color: var(--accent); }

  @media (max-width: 1024px) { .card-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 768px) { .card-grid { grid-template-columns: repeat(2, 1fr); } .profile-header { flex-direction: column; text-align: center; } }
</style>
</head>
<body>

<nav class="navbar">
  <a class="nav-brand" href="#">🧱 BrickPlans</a>
  <div class="nav-actions">
    <button class="btn btn-ghost">📤 上传图纸</button>
    <img src="https://api.dicebear.com/7.x/thumbs/svg?seed=jack" style="width:32px;height:32px;border-radius:50%;cursor:pointer" alt="">
  </div>
</nav>

<main class="main">

  <!-- Profile Header -->
  <div class="profile-header">
    <img class="profile-avatar" src="https://api.dicebear.com/7.x/thumbs/svg?seed=jack" alt="">
    <div class="profile-info">
      <div class="profile-name">积木大师Jack</div>
      <div class="profile-meta">2025年1月加入</div>
      <div class="profile-bio">🧱 热爱积木创作的建筑师 | 专攻科幻和机甲主题 | 欢迎交流拼搭心得</div>
    </div>
    <div class="profile-actions">
      <button class="btn btn-outline" onclick="toggleSettings()">✏️ 编辑资料</button>
      <button class="btn btn-primary">📤 上传作品</button>
      <button class="btn btn-ghost">🚪 退出</button>
    </div>
  </div>

  <!-- Settings panel (hidden by default) -->
  <div class="settings-panel" id="settings-panel" style="display:none;">
    <h3>编辑资料</h3>
    <div class="form-group">
      <label class="form-label">昵称</label>
      <input class="form-input" value="积木大师Jack">
    </div>
    <div class="form-group">
      <label class="form-label">个人简介</label>
      <input class="form-input" value="热爱积木创作的建筑师">
    </div>
    <div class="form-group">
      <label class="form-label">头像</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;">
        <img src="https://api.dicebear.com/7.x/thumbs/svg?seed=1" style="width:40px;height:40px;border-radius:50%;cursor:pointer;border:2px solid transparent;" onclick="this.style.borderColor='var(--accent)'">
        <img src="https://api.dicebear.com/7.x/thumbs/svg?seed=2" style="width:40px;height:40px;border-radius:50%;cursor:pointer;border:2px solid transparent;" onclick="this.style.borderColor='var(--accent)'">
        <img src="https://api.dicebear.com/7.x/thumbs/svg?seed=3" style="width:40px;height:40px;border-radius:50%;cursor:pointer;border:2px solid transparent;" onclick="this.style.borderColor='var(--accent)'">
      </div>
    </div>
    <button class="btn btn-primary">保存</button>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-box"><div class="number">8</div><div class="label">📐 作品</div></div>
    <div class="stat-box"><div class="number">15</div><div class="label">❤️ 收藏</div></div>
    <div class="stat-box"><div class="number">1.2k</div><div class="label">👁 获浏览</div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active">📐 我的作品</button>
    <button class="tab-btn">⭐ 我的收藏</button>
  </div>

  <!-- Card grid -->
  <div class="card-grid">
    <div class="card">
      <div class="card-img-wrap">
        <img class="card-img" src="https://images.unsplash.com/photo-1587654780291-39c9404d746b?w=400&h=300&fit=crop">
        <span class="card-diff" style="background:rgba(245,158,11,.75);">⭐⭐⭐ 中等</span>
        <span class="card-parts">🧩 450片</span>
      </div>
      <div class="card-body">
        <div class="card-title">经典太空飞船 — 星际巡洋舰</div>
        <div class="card-stats"><span>👁 2.3k</span><span>❤️ 186</span><span>⭐ 52</span></div>
        <div class="card-actions">
          <button class="btn btn-ghost" onclick="event.stopPropagation();alert('编辑')">✏️</button>
          <button class="btn btn-ghost" onclick="event.stopPropagation();alert('删除')" style="color:#ef4444;">🗑️</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-img-wrap" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);">
        <span style="font-size:3rem;display:flex;align-items:center;justify-content:center;height:100%;color:rgba(255,255,255,.85);">🚀</span>
        <span class="card-diff" style="background:rgba(34,197,94,.75);">⭐ 简单</span>
        <span class="card-parts">🧩 200片</span>
      </div>
      <div class="card-body">
        <div class="card-title">迷你火箭发射台</div>
        <div class="card-stats"><span>👁 580</span><span>❤️ 34</span><span>⭐ 12</span></div>
        <div class="card-actions">
          <button class="btn btn-ghost" onclick="event.stopPropagation();alert('编辑')">✏️</button>
          <button class="btn btn-ghost" onclick="event.stopPropagation();alert('删除')" style="color:#ef4444;">🗑️</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-img-wrap">
        <img class="card-img" src="https://images.unsplash.com/photo-1518331483807-f6adb0e1ad23?w=400&h=300&fit=crop">
        <span class="card-diff" style="background:rgba(168,85,247,.75);">⭐⭐⭐⭐⭐ 专家</span>
        <span class="card-parts">🧩 3200片</span>
      </div>
      <div class="card-body">
        <div class="card-title">机甲战士 MK-III</div>
        <div class="card-stats"><span>👁 3.1k</span><span>❤️ 274</span><span>⭐ 89</span></div>
        <div class="card-actions">
          <button class="btn btn-ghost" onclick="event.stopPropagation();alert('编辑')">✏️</button>
          <button class="btn btn-ghost" onclick="event.stopPropagation();alert('删除')" style="color:#ef4444;">🗑️</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-img-wrap">
        <img class="card-img" src="https://images.unsplash.com/photo-1558060370-d644479cb6f7?w=400&h=300&fit=crop">
        <span class="card-diff" style="background:rgba(245,158,11,.75);">⭐⭐⭐ 中等</span>
        <span class="card-parts">🧩 1200片</span>
      </div>
      <div class="card-body">
        <div class="card-title">忍者机甲</div>
        <div class="card-stats"><span>👁 1k</span><span>❤️ 56</span><span>⭐ 18</span></div>
        <div class="card-actions">
          <button class="btn btn-ghost" onclick="event.stopPropagation();alert('编辑')">✏️</button>
          <button class="btn btn-ghost" onclick="event.stopPropagation();alert('删除')" style="color:#ef4444;">🗑️</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Pagination -->
  <div style="display:flex;justify-content:center;gap:6px;margin-top:32px;">
    <button class="btn btn-ghost" style="background:#1d1d1f;color:#fff;">1</button>
    <button class="btn btn-ghost">2</button>
    <button class="btn btn-ghost">→</button>
  </div>

</main>

<script>
  function toggleSettings() {
    const p = document.getElementById('settings-panel');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
  }
  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
</script>

</body>
</html>
