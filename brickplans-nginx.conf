# BrickPlans — frontend static assets + backend SSR/API reverse proxy.
# Static files (assets, robots.txt, llms.txt, preset avatars) are served by nginx;
# everything else (/, /detail/:id, /explore, /tags/:name, /user/:id, ...) is proxied
# to the Go backend which returns server-rendered HTML for SEO/GEO.
server {
    listen 8310;
    server_name _;

    root /home/ubuntu/project/brickplans/frontend/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript text/html application/json text/plain;
    gzip_min_length 512;

    # Security headers (HSTS requires HTTPS terminated at this layer).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; media-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;

    # Cache hashed static assets (vite emits /assets/index-<hash>.{js,css}).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
    location ~* \.(css|js|png|jpg|jpeg|gif|webp|svg|ico|woff2?|ttf)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # Plain static files served by nginx (not SSR).
    location = /robots.txt { default_type text/plain; }
    location = /llms.txt { default_type text/plain; }
    location = /og-default.png { }
    location /avatars/ { }

    # Uploaded files → backend (local storage).
    location ^~ /uploads/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    # API → backend.
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Everything else → backend SSR (server-rendered HTML).
    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
