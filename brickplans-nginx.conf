# BrickPlans — frontend + API reverse proxy
server {
    listen 8310;
    server_name _;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript text/html application/json;
    gzip_min_length 512;

    # Security headers. The Go backend sets the same headers on /api responses;
    # adding them here also covers frontend static assets. Duplicate headers with
    # identical values are harmless (browsers take the first / intersect CSP).
    # HSTS requires HTTPS — only effective once TLS is terminated at this layer.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; media-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;

    # Frontend static files
    root /home/ubuntu/project/brickplans/frontend/dist;
    index index.html;

    # Custom error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /404.html { root /home/ubuntu/project/brickplans/frontend; }
    location = /50x.html { root /home/ubuntu/project/brickplans/frontend; }

    # Cache static assets from dist (short cache during dev)
    location ~* \.(css|js|png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # Uploaded images proxy to backend (^~ disables regex matching)
    location ^~ /uploads/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    # API proxy to backend
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — all non-file routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
