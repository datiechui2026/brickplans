<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{.Title}}</title>
  <meta name="description" content="{{.Description}}" />
  <link rel="canonical" href="{{.Canonical}}" />
  <meta property="og:title" content="{{.OGTitle}}" />
  <meta property="og:description" content="{{.OGDescription}}" />
  <meta property="og:image" content="{{.OGImage}}" />
  <meta property="og:url" content="{{.OGUrl}}" />
  <meta property="og:type" content="{{.OGType}}" />
  <meta property="og:site_name" content="BrickPlans" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{.OGTitle}}" />
  <meta name="twitter:description" content="{{.OGDescription}}" />
  <meta name="twitter:image" content="{{.OGImage}}" />
  {{range .JSONLD}}<script type="application/ld+json">{{.}}</script>
  {{end}}
  <link rel="icon" type="image/svg+xml" href="{{.Favicon}}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  {{if .CSSFile}}<link rel="stylesheet" href="/{{.CSSFile}}" />{{end}}
  <script async defer src="/umami.js" data-website-id="630eea47-5406-4ee3-a80b-cb58b683c196"></script>
</head>
<body>
  <div id="app">{{.Noscript}}</div>
  {{if .JSFile}}<script type="module" src="/{{.JSFile}}"></script>{{end}}
</body>
</html>
